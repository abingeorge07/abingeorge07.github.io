      <h4>Project Description: </h4>  

      <p style="text-align: justify;">
        The VLAD (Vehicular Laboratory Autonomous Device) is a system that aims to automate
        laboratory workflows, eliminating the need for constant human intervention and saving valuable time. 
        The goal of this report is to provide a detailed description of the design, assembly,
        and testing of the VLAD system.
      </p>
      <p style="text-align: justify;">
        The project was the brainchild of Professor Keith Brown, who needed an efficient and flexible
        laboratory automation system for his own Laboratory. Professor Brown runs the KABlab,
        which designs and tests hierarchically structured soft materials. Part of their research is
        about developing testing systems to be able to systematically and autonomously analyze
        various material properties of developed structures and materials. However, current testing
        systems lack modularity and would be challenging to adapt to different laboratory spaces or
        different experiments. The VLAD aims to help tackle this, by allowing for spacial flexibility
        in setting up autonomous experimental systems.
