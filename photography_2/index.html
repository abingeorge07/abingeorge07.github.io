<!DOCTYPE html>
<html lang="en-us">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Photography — Abin Binoy George</title>
  <!-- Stylesheets -->
  <link rel="stylesheet" href="/css/academic.min.9e57530457aca7cbf2be8a0115b2dca9.css">
  <link rel="stylesheet" href="/css/academic.97f39ccbd0e296aa78ab2b3b93e9a354.css">
  <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.6.0/css/all.css" crossorigin="anonymous">
  <style>
    /* --- Layout & Instagram-like appearance --- */
    body { background: #fff; }
    .page-container { max-width: 935px; margin: 26px auto; padding: 0 12px; }
    .ig-header { display:flex; align-items:center; gap:12px; padding:12px 6px; border-bottom:1px solid #e6e6e6; }
    .ig-avatar { width:56px; height:56px; border-radius:50%; overflow:hidden; flex:0 0 56px; }
    .ig-avatar img { width:100%; height:100%; object-fit:cover; }
    .ig-meta { display:flex; flex-direction:column; }
    .ig-username { font-weight:700; letter-spacing:.02em; }
    .ig-follow { margin-left:auto; }
    .photo-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; background: #fff; }
    .photo-card { position:relative; width:100%; padding-top:100%; overflow:hidden; }
    .photo-card img { position:absolute; inset:0; width:100%; height:100%; object-fit:cover; display:block; }
    /* Overlay shown on hover */
    .overlay { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; color:#fff; background:rgba(0,0,0,0.32); opacity:0; transition:opacity .12s ease; }
    .overlay .meta { display:flex; gap:14px; align-items:center; font-size:14px; font-weight:600; }
    .photo-card:hover .overlay, .photo-card:focus-within .overlay { opacity:1; }
    h1 { margin:12px 0 6px; font-size:20px; }
    .lead { color:#6a6262; margin-bottom:12px; }
    .back-link { text-align:center; margin-top:22px; }
    /* --- Responsive grid --- */
    @media (min-width:1000px){ .photo-grid { grid-template-columns: repeat(3, 1fr); } }
    @media (min-width:1300px){ .photo-grid { grid-template-columns: repeat(4, 1fr); } }
    @media (max-width:640px){ .photo-grid { grid-template-columns: repeat(3, 1fr); } }
    @media (max-width:420px){ .photo-grid { grid-template-columns: repeat(3, 1fr); } }
    /* --- Fancybox custom size for popup images --- */
    .fancybox-slide--image .fancybox-image { max-width: 90vw !important; max-height: 80vh !important; width: auto !important; height: auto !important; margin: 0 auto !important; display: block !important; box-shadow: 0 8px 40px rgba(0,0,0,0.5); border-radius: 8px; }
    .fancybox-content { display: flex !important; align-items: center !important; justify-content: center !important; background: transparent !important; }
    .fancybox-bg { background: rgba(0,0,0,0.92) !important; }
  </style>
</head>
<body>
  <div class="page-container">
    <div class="page-container">
      <!-- Header -->
      <div class="ig-header">
        <div class="ig-avatar"><img src="/img/icon-192.png" alt="avatar"></div>
        <div class="ig-meta">
          <div class="ig-username">abinbinoygeorge</div>
          <div class="ig-bio">Photography • Moments • Projects</div>
        </div>
        <div class="ig-follow"><button class="btn btn-outline-primary">Follow</button></div>
      </div>
      <h1>Photography</h1>
      <p class="lead">Tap a square to view — like an Instagram grid.</p>
      <!-- Photo grid: only one photo-card is shown at a time -->
      <div class="photo-grid">
        <div class="photo-card" id="dynamic-photo-card"></div>
      </div>
      <!-- Back link -->
      <div class="back-link">
        <a href="/">← Back to home</a>
      </div>
    </div>
  </div>

  <!-- jQuery + Fancybox (from site defaults) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.4.1/jquery.min.js" crossorigin="anonymous"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/fancybox/3.2.5/jquery.fancybox.min.js" crossorigin="anonymous"></script>
  <script>
    // --- Photo data array: add your photos here ---
    const photos = [
      {
        href: '/img/ME460/460-group.jpg',
        src: '/img/ME460/460-group.jpg',
        caption: 'Group photo',
        likes: 128,
        comments: 12
      },
      {
        href: '/img/mis/work-in-progress.jpg',
        src: '/img/mis/work-in-progress.jpg',
        caption: 'Work in progress',
        likes: 64,
        comments: 8
      },
      {
        href: '/img/ME460/systemRunning.MOV',
        src: '/img/ME460/460-group.jpg', // Placeholder image for video
        caption: 'System Running (Video)',
        likes: 42,
        comments: 3
      },
      {
        href: '/img/ME460/another-photo.jpg',
        src: '/img/ME460/460-group.jpg', // Replace with actual image path
        caption: 'Another ME460 Photo',
        likes: 77,
        comments: 5
      },
      {
        href: '/img/mis/extra-photo.jpg',
        src: '/img/mis/work-in-progress.jpg', // Replace with actual image path
        caption: 'Extra Work in Progress',
        likes: 33,
        comments: 2
      }
    ];

    let currentIndex = 0;

    // --- Render a single photo in the grid ---
    function renderPhoto(index) {
      const p = photos[index];
      const card = document.getElementById('dynamic-photo-card');
      card.innerHTML = `
        <a href="${p.href}" class="dynamic-fancybox" data-caption="${p.caption}">
          <img src="${p.src}" alt="${p.caption}" loading="lazy">
          <div class="overlay" aria-hidden="true">
            <div class="meta"><span><i class='fas fa-heart'></i> ${p.likes}</span><span><i class='fas fa-comment'></i> ${p.comments}</span></div>
          </div>
        </a>
      `;
      // Unbind any previous Fancybox
      $.fancybox.close();
      // Bind Fancybox to the new element
      $('.dynamic-fancybox').fancybox({
        loop: false,
        animationEffect: 'zoom',
        transitionEffect: 'zoom',
        buttons: ["zoom", "fullScreen", "close"],
        baseClass: 'fancybox-custom-ui',
        afterClose: function() {
          // Show next photo after closing
          currentIndex = (currentIndex + 1) % photos.length;
          renderPhoto(currentIndex);
        }
      });
    }

    // --- Initialize on page load ---
    $(function(){
      renderPhoto(currentIndex);
    });
  </script>
</body>
</html>
