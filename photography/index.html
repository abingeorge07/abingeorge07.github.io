    <style>
        :root {
            --bg-color: #fcfaf7; 
            --text-main: #1a1a1a;
            --accent: #888;
        }

        body {
            background: var(--bg-color);
            font-family: 'Inter', sans-serif;
            color: var(--text-main);
            margin: 0;
        }

        .gallery-container {
            max-width: 1200px;
            margin: 80px auto;
            padding: 0 20px;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2.8rem;
            text-align: center;
            font-weight: 400;
            margin-bottom: 8px;
        }

        .subtitle {
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 0.3em;
            font-size: 0.75rem;
            color: var(--accent);
            margin-bottom: 60px;
        }

        /* Masonry Grid */
        .photo-grid {
            column-count: 3;
            column-gap: 20px;
        }

        @media (max-width: 900px) { .photo-grid { column-count: 2; } }
        @media (max-width: 600px) { .photo-grid { column-count: 1; } }

        .photo-card {
            break-inside: avoid;
            margin-bottom: 20px;
            position: relative;
            overflow: hidden;
            border-radius: 2px;
            cursor: zoom-in;
            transition: transform 0.3s ease;
        }

        .photo-card:hover {
            transform: scale(1.02);
        }

        .photo-card img {
            width: 100%;
            height: auto;
            display: block;
            transition: opacity 0.3s ease;
        }

        /* Overlay Styling for Fancybox */
        .fancybox-bg {
            background: rgba(10, 10, 10, 0.95) !important; /* Deep dark overlay */
        }
        
        .fancybox-caption {
            font-family: 'Playfair Display', serif;
            background: none !important;
            text-align: center;
            font-size: 1.2rem;
        }

        .back-link {
            text-align: center;
            margin-top: 60px;
        }

        .back-link a {
            text-decoration: none;
            color: var(--text-main);
            font-size: 0.8rem;
            border-bottom: 1px solid #ccc;
            padding-bottom: 5px;
            transition: border-color 0.3s;
        }

        .back-link a:hover { border-bottom-color: var(--text-main); }
    </style>
</head>
